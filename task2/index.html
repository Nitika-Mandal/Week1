<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <h2>User Details</h2>
    <form>
      <div>
        <label for="name">Name</label>
        <input id="name" type="text" placeholder="Enter your name" required />
      </div>

      <div>
        <label for="age">Age</label>
        <input id="age" type="number" placeholder="Enter your age" required/>
      </div>

      <div>
        <label for="role">Which option describes you?</label>
        <select id="role" required>
            <option value="" disabled selected>Select your role</option>
            <option value="trainee" >Trainee</option>
            <option value="intern" >Intern</option>
             <option value="employee" >Employee</option>            
        </select>
      </div>
      <div>
        <p>Would you recommend Sajilo Softwares to your friend?</p>
        <input id="yes" value="yes" type="radio"  name="sajilo">
        <label for="yes">Yes</label>

         <input id="no" value="no" type="radio"  name="sajilo">
        <label for="no"> No</label>

        <input id="maybe" value="maybe" type="radio"  name="sajilo">
        <label for="maybe">Maybe</label>
      </div>

      <div>
        <p>Languages or frameworks you have used:</p>
        <input id="C" type="checkbox">
        <label for="C">C</label>

        <input id="C++" type="checkbox">
        <label for="C++">C++</label>

        <input id="html" type="checkbox">
        <label for="html">HTML</label>

        <input id="Css" type="checkbox">
        <label for="Css">CSS</label>

        <input id="py" type="checkbox">
        <label for="py">Python</label>

        <input id="Rb" type="checkbox">
        <label for="Rb">Ruby</label>

        <input id="rst" type="checkbox">
        <label for="rst">Rust</label>

        <input id="js" type="checkbox">
        <label for="js">JavaScript</label>

        <input id="react" type="checkbox">
        <label for="react">React.js</label>

        <input id="node" type="checkbox">
        <label for="node">Node.js</label>

        <input id="lav" type="checkbox">
        <label for="lav">Laravel</label>


      </div>

      <div>
        <label for="comments">Any Comments?</label>
        <textarea id="comments" placeholder="Enter your comments or suggestions here. Thankyou"></textarea>
      </div>

      <div>
        <button>Submit</button>
      </div>
    </form>
  </body>
</html>
