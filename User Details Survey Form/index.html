<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details Form</title>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h2>User Details</h2>

        <form>

            <!-- Name -->
            <div class="input-group">
                <label for="name">Full Name</label>
                <i class="fa fa-user"></i>
                <input
                    id="name"
                    type="text"
                    placeholder="Enter your name"
                    required>
            </div>

            <!-- Age -->
            <div>
                <label for="age">Age</label>
                <input
                    id="age"
                    type="number"
                    placeholder="Enter your age"
                    required>
            </div>

            <!-- Role -->
            <div>
                <label for="role">Which option describes you?</label>
                <select id="role" required>
                    <option value="" disabled selected>Select your role</option>
                    <option value="trainee">Trainee</option>
                    <option value="intern">Intern</option>
                    <option value="employee">Employee</option>
                </select>
            </div>

            <!-- Recommendation -->
            <div>
                <p>Would you recommend Sajilo Softwares to your friend?</p>

                <input id="yes" type="radio" name="sajilo" value="yes">
                <label for="yes">Yes</label>

                <input id="no" type="radio" name="sajilo" value="no">
                <label for="no">No</label>

                <input id="maybe" type="radio" name="sajilo" value="maybe">
                <label for="maybe">Maybe</label>
            </div>

            <!-- Languages -->
            <div>
                <p>Languages or frameworks you have used:</p>

                <input id="c" type="checkbox">
                <label for="c">C</label>

                <input id="cpp" type="checkbox">
                <label for="cpp">C++</label>

                <input id="html" type="checkbox">
                <label for="html">HTML</label>

                <input id="css" type="checkbox">
                <label for="css">CSS</label>

                <input id="python" type="checkbox">
                <label for="python">Python</label>

                <input id="ruby" type="checkbox">
                <label for="ruby">Ruby</label>

                <input id="rust" type="checkbox">
                <label for="rust">Rust</label>

                <input id="javascript" type="checkbox">
                <label for="javascript">JavaScript</label>

                <input id="react" type="checkbox">
                <label for="react">React.js</label>

                <input id="node" type="checkbox">
                <label for="node">Node.js</label>

                <input id="laravel" type="checkbox">
                <label for="laravel">Laravel</label>
            </div>

            <!-- Comments -->
            <div>
                <label for="comments">Any Comments?</label>
                <textarea
                    id="comments"
                    placeholder="Enter your comments or suggestions here. Thank you."></textarea>
            </div>

            <!-- Submit Button -->
            <div>
                <button type="submit">Submit</button>
            </div>

        </form>
    </div>

</body>
</html>
